<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>北府视界概念图形 | 无限哲学知识图谱</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%2317191f'/%3E%3Ccircle cx='16' cy='16' r='7' fill='%23ffffff'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%23285bd6'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <h1>北府视界概念图形</h1>
            <p>无限哲学知识图谱</p>
          </div>
        </div>

        <form id="conceptForm" class="concept-form" autocomplete="off">
          <label class="sr-only" for="conceptInput">输入哲学概念</label>
          <input id="conceptInput" type="search" value="自由" placeholder="输入任意哲学概念，例如 自由、正义、主体性" />
          <button type="submit">生成图谱</button>
        </form>

        <div class="top-actions">
          <button id="homeButton" type="button" class="ghost-button">自由</button>
          <button id="resetViewButton" type="button" class="ghost-button">重置视图</button>
        </div>
      </header>

      <main class="workspace">
        <section class="graph-stage" aria-label="哲学知识图谱画布">
          <canvas id="graphCanvas"></canvas>

          <div id="nodeTooltip" class="node-tooltip" hidden></div>

          <div class="graph-status" aria-live="polite">
            <span id="currentConcept">自由</span>
            <span id="nodeCount">0 个概念</span>
            <span id="linkCount">0 条关系</span>
          </div>

          <div class="canvas-help">
            <span>滚轮缩放</span>
            <span>拖动画布</span>
            <span>点击概念跳转</span>
          </div>
        </section>

        <aside class="inspector" aria-label="知识图谱控制面板">
          <section class="panel-section">
            <div class="section-heading">
              <h2 id="detailTitle">自由</h2>
              <span id="detailType">中心概念</span>
            </div>
            <p id="detailSummary" class="summary-text"></p>
            <div id="deepExplanation" class="deep-explanation"></div>
          </section>

          <section class="panel-section controls">
            <label>
              <span>相关范围</span>
              <input id="scopeSlider" type="range" min="90" max="260" step="10" value="170" />
            </label>
            <label>
              <span>标签密度</span>
              <input id="labelSlider" type="range" min="0.25" max="1" step="0.05" value="0.72" />
            </label>
            <label class="toggle-row">
              <span>物理动画</span>
              <input id="physicsToggle" type="checkbox" checked />
            </label>
          </section>

          <section class="panel-section">
            <div class="section-heading compact">
              <h3>相关词条</h3>
              <button id="expandButton" type="button" class="small-button">扩展</button>
            </div>
            <div id="relationList" class="relation-list"></div>
          </section>

          <section class="panel-section">
            <h3>探索路径</h3>
            <div id="historyList" class="history-list"></div>
          </section>

          <section class="panel-section">
            <h3>知识类型</h3>
            <div id="legend" class="legend"></div>
          </section>
        </aside>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
